{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="card shadow p-4">
        <h3 class="text-danger">⚠ Eliminar Paciente</h3>

        <p class="mt-3">
            ¿Estás seguro que deseas eliminar al paciente:
            <strong>{{ object.nombre }} {{ object.apellido_paterno }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                Sí, eliminar
            </button>

            <a href="{% url 'paciente_list' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </form>
    </div>

</div>
{% endblock %}
