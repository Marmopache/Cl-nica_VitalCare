{% extends "base.html" %}

{% block content %}

  <h3>Panel de Control</h3>
  <div class="row justify-content-center mt-4">

        <!-- Botón Pacientes -->
        <div class="col-md-3 mb-3">
        <a href="{% url 'paciente_list' %}" class="btn btn-pacientes btn-lg w-100 py-4">
            <i class="fa-solid fa-user-injured fa-2x mb-2"></i>
            <br>Pacientes
        </a>
        </div>

        <!-- Botón Doctores -->
        <div class="col-md-3 mb-3">

            <i class="fa-solid fa-user-doctor fa-2x mb-2"></i>
            <br>Doctores
        </a>
        </div>

        <!-- Botón Horas Médicas -->
        <div class="col-md-3 mb-3">
        <a href="{% url 'hora_list' %}" class="btn btn-horas btn-lg w-100 py-4">
            <i class="fa-solid fa-calendar-check fa-2x mb-2"></i>

    </div>
