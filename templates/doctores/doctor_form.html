{% extends "base.html" %}
{% block content %}
<h3>{{ form.instance.id|yesno:"Editar Doctor,Nuevo Doctor" }}</h3>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'doctor_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
