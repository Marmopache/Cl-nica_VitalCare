{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="card shadow p-4">
        <h3 class="text-danger">⚠ Eliminar Hora Médica</h3>

        <p class="mt-3">
            ¿Estás seguro que deseas eliminar esta hora médica?
        </p>

        <ul>
            <li><strong>Paciente:</strong> {{ object.paciente }}</li>
            <li><strong>Doctor:</strong> {{ object.doctor }}</li>
            <li><strong>Fecha:</strong> {{ object.fecha }}</li>
            <li><strong>Hora:</strong> {{ object.hora }}</li>
        </ul>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                Sí, eliminar
            </button>

            <a href="{% url 'hora_list' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </form>
    </div>

</div>
{% endblock %}
